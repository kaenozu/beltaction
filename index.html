<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maki Beat 'Em Up</title>
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    canvas {
      display: block;
      margin: 0 auto;
      background: #111;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      image-rendering: auto;
    }
    #hud { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; font-size: 16px; z-index: 10; }
    #shortcuts {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #ddd;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.45;
      text-align: right;
      z-index: 10;
      text-shadow: 1px 1px 0 #000;
      user-select: none;
    }
    #shortcuts kbd {
      color: #fff;
      font: inherit;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1280" height="960"></canvas>
  <div id="hud"></div>
  <div id="shortcuts" aria-label="Keyboard shortcuts">
    <div><kbd>WASD</kbd> Move</div>
    <div><kbd>Space</kbd> Jump</div>
    <div><kbd>J</kbd> Attack <kbd>K</kbd> Kick</div>
    <div><kbd>1</kbd> Grunt <kbd>2</kbd> Chain <kbd>3</kbd> Mount <kbd>4</kbd> Strongman</div>
    <div><kbd>R</kbd> Restart <kbd>M</kbd> Wave</div>
    <div><kbd>B</kbd> Hitboxes <kbd>I</kbd> No-DMG <kbd>G</kbd> Post-KO <kbd>T</kbd> Trip</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
